     <script>
      (function () {
        const el = document.getElementById('clock');
        const dateFmt = new Intl.DateTimeFormat('en-US', {
          weekday: 'long',
          month: 'long',
          day: 'numeric',
          timeZone: 'Asia/Seoul',
        });
        const timeFmt = new Intl.DateTimeFormat('en-GB', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
          timeZone: 'Asia/Seoul',
        });
        function tick() {
          const now = new Date();
          el.textContent = dateFmt.format(now) + ', at ' + timeFmt.format(now) + ' on Jeju Island.';
        }
        tick();
        setInterval(tick, 1000);
      })();
    </script>
